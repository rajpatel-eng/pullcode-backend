spring:
  datasource:
    url: jdbc:mysql://localhost:3306/code_review_db
    username: root
    password: raj@patel@23
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

app:
  jwt:
    secret: ${JWT_SECRET:your-super-secret-jwt-key-must-be-at-least-256-bits-long-for-hs256}
    access-token-expiration-ms: 900000        # 15 minutes
    refresh-token-expiration-ms: 604800000    # 7 days

server:
  port: 8080

logging:
  level:
    org.springframework.security: DEBUG
    com.capstoneproject: DEBUG